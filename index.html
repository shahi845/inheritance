<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Inheritance (Fara'id) Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Fara'id Calculator</h1>
            <p>Calculate Islamic inheritance shares according to Qur'anic rules.</p>
        </header>

        <main>
            <section class="estate-section glass-panel">
                <h2>Estate Value</h2>
                <div class="input-group">
                    <label for="estateValue">Total Estate Amount (Optional):</label>
                    <input type="number" id="estateValue" min="0" placeholder="e.g., 100000">
                </div>
            </section>

            <div class="heirs-grid">
                <section class="male-heirs glass-panel">
                    <h2>Male Heirs</h2>
                    <div class="input-group">
                        <label for="husband">Husband (0 or 1)</label>
                        <input type="number" id="husband" min="0" max="1" value="0">
                    </div>
                    <div class="input-group">
                        <label for="father">Father (0 or 1)</label>
                        <input type="number" id="father" min="0" max="1" value="0">
                    </div>
                    <div class="input-group">
                        <label for="grandfather">Paternal Grandfather (0 or 1)</label>
                        <input type="number" id="grandfather" min="0" max="1" value="0">
                    </div>
                    <div class="input-group">
                        <label for="son">Sons</label>
                        <input type="number" id="son" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="grandson">Grandsons (Son's Sons)</label>
                        <input type="number" id="grandson" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="brother">Full Brothers</label>
                        <input type="number" id="brother" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="paternalBrother">Paternal Half-Brothers</label>
                        <input type="number" id="paternalBrother" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="maternalBrother">Maternal Half-Brothers</label>
                        <input type="number" id="maternalBrother" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="uncle">Paternal Uncles</label>
                        <input type="number" id="uncle" min="0" value="0">
                    </div>
                </section>

                <section class="female-heirs glass-panel">
                    <h2>Female Heirs</h2>
                    <div class="input-group">
                        <label for="wife">Wives (0 to 4)</label>
                        <input type="number" id="wife" min="0" max="4" value="0">
                    </div>
                    <div class="input-group">
                        <label for="mother">Mother (0 or 1)</label>
                        <input type="number" id="mother" min="0" max="1" value="0">
                    </div>
                    <div class="input-group">
                        <label for="grandmother">Grandmother (0, 1, or 2)</label>
                        <input type="number" id="grandmother" min="0" max="2" value="0">
                    </div>
                    <div class="input-group">
                        <label for="daughter">Daughters</label>
                        <input type="number" id="daughter" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="granddaughter">Son's Daughters</label>
                        <input type="number" id="granddaughter" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="sister">Full Sisters</label>
                        <input type="number" id="sister" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="paternalSister">Paternal Half-Sisters</label>
                        <input type="number" id="paternalSister" min="0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="maternalSister">Maternal Half-Sisters</label>
                        <input type="number" id="maternalSister" min="0" value="0">
                    </div>
                </section>
            </div>

            <div class="actions">
                <button id="calculateBtn" class="primary-btn">Calculate Shares</button>
                <button id="resetBtn" class="secondary-btn">Reset</button>
                <button id="printBtn" class="secondary-btn hidden" onclick="window.print()"><i class="fas fa-print"></i>
                    Print Report</button>
            </div>

            <section class="results-section glass-panel hidden" id="resultsSection">
                <h2>Inheritance Distribution</h2>
                <div class="table-responsive">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>Heir</th>
                                <th>Count</th>
                                <th>Status</th>
                                <th>Total Fraction</th>
                                <th>Per Person %</th>
                                <th>Per Person Amount</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            <!-- Results populated by JS -->
                        </tbody>
                    </table>
                </div>
                <div id="messages" class="messages-container"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
